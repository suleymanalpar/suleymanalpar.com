<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Seçenekleri</title>
<style>
  body { font-family: 'Inter', sans-serif; background: #0f2440; color: white; padding: 40px; text-align: center; }
  h1 { margin-bottom: 40px; font-size: 1.5rem; opacity: 0.8; }
  .options { display: flex; flex-wrap: wrap; justify-content: center; gap: 60px; }
  .option { text-align: center; }
  .option h3 { margin-top: 20px; font-size: 1rem; opacity: 0.7; }
  .circle { width: 320px; height: 320px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; position: relative; background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)); }
</style>
</head>
<body>
<h1>Hero bölümünde nasıl görünecekler:</h1>
<div class="options">

<!-- Seçenek 1: Minimal SA monogram -->
<div class="option">
<div class="circle">
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Caduceus subtle background -->
  <line x1="100" y1="45" x2="100" y2="170" stroke="rgba(198,151,63,0.15)" stroke-width="2"/>
  <ellipse cx="100" cy="90" rx="18" ry="10" fill="none" stroke="rgba(198,151,63,0.12)" stroke-width="1.5" transform="rotate(-20,100,90)"/>
  <ellipse cx="100" cy="110" rx="18" ry="10" fill="none" stroke="rgba(198,151,63,0.12)" stroke-width="1.5" transform="rotate(20,100,110)"/>
  <!-- SA Letters -->
  <text x="100" y="120" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">SA</text>
  <!-- Subtle line -->
  <line x1="45" y1="135" x2="155" y2="135" stroke="rgba(198,151,63,0.6)" stroke-width="1.5"/>
  <!-- Subtitle -->
  <text x="100" y="155" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="rgba(198,151,63,0.9)" letter-spacing="4">ACİL TIP</text>
</svg>
</div>
<h3>Seçenek 1 — Minimal monogram</h3>
</div>

<!-- Seçenek 2: Hexagonal medical -->
<div class="option">
<div class="circle">
<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon -->
  <polygon points="110,30 175,62 175,128 110,160 45,128 45,62" fill="none" stroke="rgba(198,151,63,0.5)" stroke-width="1.5"/>
  <!-- Inner hexagon -->
  <polygon points="110,48 160,72 160,120 110,144 60,120 60,72" fill="rgba(198,151,63,0.06)" stroke="rgba(198,151,63,0.2)" stroke-width="1"/>
  <!-- SA -->
  <text x="110" y="112" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="56" font-weight="700" fill="white" letter-spacing="-1">SA</text>
  <!-- Star of life hint - small cross -->
  <line x1="110" y1="60" x2="110" y2="50" stroke="rgba(198,151,63,0.7)" stroke-width="2"/>
  <line x1="105" y1="55" x2="115" y2="55" stroke="rgba(198,151,63,0.7)" stroke-width="2"/>
  <!-- Bottom text -->
  <text x="110" y="182" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="5">ACİL TIP UZMANI</text>
</svg>
</div>
<h3>Seçenek 2 — Altıgen tıbbi</h3>
</div>

<!-- Seçenek 3: Elegant circle with star of life -->
<div class="option">
<div class="circle">
<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Star of Life (6-pointed) simplified -->
  <g opacity="0.08" fill="white">
    <rect x="112" y="40" width="16" height="80" rx="3"/>
    <rect x="112" y="120" width="16" height="80" rx="3"/>
    <rect x="112" y="40" width="16" height="160" rx="3" transform="rotate(60,120,120)"/>
    <rect x="112" y="40" width="16" height="160" rx="3" transform="rotate(-60,120,120)"/>
  </g>
  <!-- Arc text top -->
  <defs>
    <path id="arc-top" d="M 30,120 a 90,90 0 0,1 180,0"/>
  </defs>
  <text font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="rgba(198,151,63,1)" letter-spacing="3">
    <textPath href="#arc-top" startOffset="50%" text-anchor="middle">DR. SÜLEYMAN ALPAR</textPath>
  </text>
  <!-- Arc text bottom -->
  <defs>
    <path id="arc-bottom" d="M 30,125 a 90,90 0 0,0 180,0"/>
  </defs>
  <text font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="rgba(198,151,63,0.85)" letter-spacing="4">
    <textPath href="#arc-bottom" startOffset="50%" text-anchor="middle">ACİL TIP UZMANI</textPath>
  </text>
</svg>
</div>
<h3>Seçenek 3 — Yay yazılı amblem</h3>
</div>

</div>
</body>
</html>
